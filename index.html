<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACT GPA Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           IMPPECCABLE DESIGN SYSTEM
           Register: Product (tool)
           Scene: Student calculating GPA at night in
           dorm room under desk lamp, or in bright
           library during daytime study session.
           ============================================ */

        :root {
            /* OKLCH Primitive Tokens
               Brand hue: 80 (warm amber)
               Tinted neutrals toward brand hue
               Chroma kept low for neutrals (0.005-0.01) */

            /* Dark mode (default: night study session) */
            --bg-primary: oklch(14% 0.005 80);
            --bg-secondary: oklch(20% 0.008 80);
            --bg-tertiary: oklch(26% 0.01 80);
            --bg-elevated: oklch(22% 0.009 80);

            --fg-primary: oklch(96% 0.005 80);
            --fg-secondary: oklch(75% 0.01 80);
            --fg-tertiary: oklch(55% 0.008 80);
            --fg-muted: oklch(40% 0.006 80);

            /* Accent: warm amber, used sparingly (Restrained strategy) */
            --accent: oklch(72% 0.16 80);
            --accent-hover: oklch(78% 0.18 80);
            --accent-active: oklch(66% 0.14 80);
            --accent-subtle: oklch(72% 0.16 80 / 0.1);

            /* Semantic colors - tinted toward brand */
            --success: oklch(65% 0.15 145);
            --success-bg: oklch(65% 0.15 145 / 0.08);
            --warning: oklch(70% 0.14 75);
            --warning-bg: oklch(70% 0.14 75 / 0.08);
            --danger: oklch(60% 0.18 25);
            --danger-bg: oklch(60% 0.18 25 / 0.08);

            --border-default: oklch(100% 0 80 / 0.06);
            --border-hover: oklch(100% 0 80 / 0.12);
            --border-focus: var(--accent);

            /* Typography */
            --font-sans: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: 'Instrument Serif', Georgia, serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Spacing: 4pt base */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --space-16: 64px;

            /* Easing: exponential curves */
            --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);

            /* Durations */
            --duration-instant: 120ms;
            --duration-fast: 200ms;
            --duration-normal: 300ms;
            --duration-slow: 500ms;
        }

        [data-theme="light"] {
            /* Light mode: library daytime study */
            --bg-primary: oklch(97% 0.005 80);
            --bg-secondary: oklch(93% 0.008 80);
            --bg-tertiary: oklch(88% 0.01 80);
            --bg-elevated: oklch(96% 0.007 80);

            --fg-primary: oklch(18% 0.01 80);
            --fg-secondary: oklch(45% 0.008 80);
            --fg-tertiary: oklch(55% 0.006 80);
            --fg-muted: oklch(70% 0.005 80);

            --accent: oklch(55% 0.15 80);
            --accent-hover: oklch(50% 0.14 80);
            --accent-active: oklch(60% 0.16 80);
            --accent-subtle: oklch(55% 0.15 80 / 0.08);

            --border-default: oklch(18% 0.01 80 / 0.08);
            --border-hover: oklch(18% 0.01 80 / 0.15);
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }
        html { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--fg-primary);
            font-size: 15px;
            line-height: 1.55;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--duration-normal) var(--ease-out-quart),
                        color var(--duration-normal) var(--ease-out-quart);
        }

        /* Scrollbar: minimal */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--fg-muted); border-radius: 2px; }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-fade-up {
            animation: fadeUp var(--duration-slow) var(--ease-out-expo) forwards;
            opacity: 0;
        }
        .anim-d1 { animation-delay: 40ms; }
        .anim-d2 { animation-delay: 80ms; }
        .anim-d3 { animation-delay: 120ms; }
        .anim-d4 { animation-delay: 160ms; }
        .anim-d5 { animation-delay: 200ms; }

        /* ============================================
           LAYOUT
           ============================================ */
        .app { min-height: 100vh; display: flex; flex-direction: column; }
        .container {
            max-width: 640px; margin: 0 auto;
            padding: 0 var(--space-5);
            width: 100%;
        }

        /* ============================================
           HEADER
           No hero-metric template. GPA integrated
           naturally into header area.
           ============================================ */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-default);
            backdrop-filter: blur(12px);
            transition: all var(--duration-normal) var(--ease-out-quart);
        }
        .header-inner {
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--space-4) 0;
        }
        .brand {
            display: flex; align-items: center; gap: var(--space-3);
        }
        .brand-mark {
            font-family: var(--font-serif);
            font-size: 22px; font-weight: 400;
            font-style: italic;
            color: var(--accent);
            line-height: 1;
        }
        .brand-text h1 {
            font-family: var(--font-sans);
            font-size: 15px; font-weight: 600;
            color: var(--fg-primary);
            line-height: 1.3;
            letter-spacing: -0.01em;
        }
        .brand-text span {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 500;
            color: var(--fg-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-default);
            background: transparent;
            color: var(--fg-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all var(--duration-fast) var(--ease-out-quart);
        }
        .theme-toggle:hover {
            border-color: var(--border-hover);
            color: var(--fg-primary);
        }

        /* ============================================
           GPA SUMMARY (integrated, not hero-metric)
           ============================================ */
        .gpa-summary {
            padding: var(--space-8) 0 var(--space-6);
            border-bottom: 1px solid var(--border-default);
            margin-bottom: var(--space-6);
        }
        .gpa-summary-inner {
            display: flex; align-items: baseline; gap: var(--space-4);
            flex-wrap: wrap;
        }
        .gpa-number {
            font-family: var(--font-serif);
            font-size: 56px; font-weight: 400;
            color: var(--fg-primary);
            line-height: 1;
            letter-spacing: -0.03em;
        }
        .gpa-number .decimal {
            font-size: 36px;
            color: var(--fg-secondary);
        }
        .gpa-meta {
            display: flex; flex-direction: column; gap: var(--space-1);
            padding-top: var(--space-2);
        }
        .gpa-meta .label {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 500;
            color: var(--fg-tertiary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .gpa-meta .value {
            font-family: var(--font-mono);
            font-size: 14px; font-weight: 500;
            color: var(--fg-secondary);
        }
        .gpa-standing {
            margin-left: auto;
            padding-top: var(--space-2);
        }
        .standing-tag {
            display: inline-flex;
            padding: var(--space-1) var(--space-3);
            border: 1px solid;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .standing-tag.president {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-subtle);
        }
        .standing-tag.dean {
            border-color: var(--success);
            color: var(--success);
            background: var(--success-bg);
        }
        .standing-tag.good {
            border-color: var(--fg-muted);
            color: var(--fg-tertiary);
        }
        .standing-tag.probation {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-bg);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main {
            flex: 1;
            padding-bottom: calc(var(--space-16) + 60px);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn var(--duration-normal) var(--ease-out-quart); }

        /* ============================================
           SECTION TITLE
           ============================================ */
        .section-title {
            font-family: var(--font-serif);
            font-size: 28px; font-weight: 400;
            color: var(--fg-primary);
            line-height: 1.2;
            margin-bottom: var(--space-2);
            letter-spacing: -0.02em;
        }
        .section-subtitle {
            font-size: 14px;
            color: var(--fg-secondary);
            margin-bottom: var(--space-6);
            max-width: 45ch;
        }

        /* ============================================
           SELECTOR
           ============================================ */
        .selector-row {
            display: flex; align-items: center; gap: var(--space-3);
            margin-bottom: var(--space-5);
            flex-wrap: wrap;
        }
        .select-wrapper {
            position: relative; flex: 1; min-width: 220px;
        }
        .select-wrapper select {
            appearance: none; width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: var(--space-3) var(--space-10) var(--space-3) var(--space-4);
            font-family: var(--font-sans);
            font-size: 14px; font-weight: 500;
            color: var(--fg-primary);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out-quart);
        }
        .select-wrapper select:hover, .select-wrapper select:focus {
            border-color: var(--border-hover);
            outline: none;
        }
        .select-wrapper::after {
            content: "↓";
            position: absolute; right: var(--space-4); top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-mono);
            font-size: 12px; color: var(--fg-tertiary);
            pointer-events: none;
        }
        .credit-pill {
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--border-default);
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 11px; font-weight: 500;
            color: var(--fg-secondary);
        }
        .credit-pill.warning {
            color: var(--danger);
            border-color: var(--danger);
            background: var(--danger-bg);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-track {
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: var(--space-6);
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.8s var(--ease-out-expo);
        }

        /* ============================================
           COURSE LIST (no cards, no side-stripes)
           Uses spacing and typography for hierarchy.
           ============================================ */
        .course-list {
            display: flex; flex-direction: column;
            gap: var(--space-1);
        }
        .course-item {
            padding: var(--space-4) 0;
            border-bottom: 1px solid var(--border-default);
            transition: opacity var(--duration-fast) var(--ease-out-quart);
        }
        .course-item:first-child {
            border-top: 1px solid var(--border-default);
        }
        .course-item.excluded { opacity: 0.35; }
        .course-item.retaken { opacity: 0.45; }
        .course-item.retaken .course-name { text-decoration: line-through; }

        .course-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: var(--space-3);
        }
        .course-info {
            display: flex; align-items: flex-start; gap: var(--space-3);
            flex: 1;
        }
        .course-checkbox {
            width: 16px; height: 16px;
            accent-color: var(--accent);
            margin-top: 3px; flex-shrink: 0;
            cursor: pointer;
        }
        .course-name {
            font-family: var(--font-sans);
            font-size: 15px; font-weight: 500;
            color: var(--fg-primary);
            line-height: 1.4;
        }
        .course-credits {
            font-family: var(--font-mono);
            font-size: 10px; color: var(--fg-tertiary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: var(--space-1);
        }
        .course-actions {
            display: flex; align-items: center; gap: var(--space-2);
            flex-shrink: 0;
        }
        .grade-tag {
            padding: 2px 8px;
            border: 1px solid;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 11px; font-weight: 600;
        }
        .grade-A { border-color: var(--success); color: var(--success); }
        .grade-B { border-color: var(--accent); color: var(--accent); }
        .grade-C { border-color: var(--warning); color: var(--warning); }
        .grade-D { border-color: var(--danger); color: #C45B6A; }
        .grade-F { border-color: var(--danger); color: var(--danger); }
        .course-delete {
            width: 24px; height: 24px;
            border: none; background: transparent;
            color: var(--fg-muted);
            cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: all var(--duration-fast) var(--ease-out-quart);
            border-radius: 4px;
        }
        .course-item:hover .course-delete { opacity: 1; }
        .course-delete:hover { color: var(--danger); background: var(--danger-bg); }

        .course-inputs {
            display: grid; grid-template-columns: 1fr 90px;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
        }
        .course-input {
            width: 100%;
            padding: var(--space-2) var(--space-3);
            background: var(--bg-primary);
            border: 1px solid var(--border-default);
            border-radius: 6px;
            color: var(--fg-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            transition: all var(--duration-fast) var(--ease-out-quart);
        }
        .course-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }
        .course-input::placeholder { color: var(--fg-muted); }
        .course-flags {
            display: flex; gap: var(--space-5); flex-wrap: wrap;
        }
        .flag {
            display: flex; align-items: center; gap: var(--space-1);
            font-size: 13px; color: var(--fg-secondary);
            cursor: pointer;
            transition: color var(--duration-fast) var(--ease-out-quart);
        }
        .flag:hover { color: var(--fg-primary); }
        .flag input { accent-color: var(--accent); cursor: pointer; }
        .flag.retake input { accent-color: var(--danger); }

        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: var(--space-2); padding: var(--space-3) var(--space-5);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out-quart);
            border: none;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            background: var(--accent-active);
            transform: translateY(0);
            transition-duration: var(--duration-instant);
        }
        .btn-secondary {
            background: transparent;
            color: var(--fg-secondary);
            border: 1px solid var(--border-default);
        }
        .btn-secondary:hover {
            border-color: var(--border-hover);
            color: var(--fg-primary);
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger-bg);
        }
        .action-row {
            display: flex; gap: var(--space-2);
            margin-top: var(--space-5);
            flex-wrap: wrap;
        }
        .action-row .btn { flex: 1; min-width: 130px; }

        /* ============================================
           SEMESTER ROWS (CGPA)
           ============================================ */
        .semester-row {
            display: grid;
            grid-template-columns: 1fr 80px 80px;
            gap: var(--space-3);
            align-items: center;
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--border-default);
            transition: opacity var(--duration-fast) var(--ease-out-quart);
        }
        .semester-row:first-child {
            border-top: 1px solid var(--border-default);
        }
        .semester-row.excluded { opacity: 0.3; }
        .semester-name {
            display: flex; align-items: center; gap: var(--space-3);
        }
        .toggle-track {
            width: 32px; height: 18px;
            background: var(--fg-muted);
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            transition: background var(--duration-fast) var(--ease-out-quart);
        }
        .toggle-track.on { background: var(--accent); }
        .toggle-track::after {
            content: '';
            position: absolute; top: 2px; left: 2px;
            width: 14px; height: 14px;
            background: var(--fg-primary);
            border-radius: 50%;
            transition: transform var(--duration-fast) var(--ease-out-quart);
        }
        .toggle-track.on::after { transform: translateX(14px); }
        .semester-name label {
            font-size: 14px; font-weight: 500;
            color: var(--fg-primary);
            cursor: pointer;
        }
        .semester-input {
            width: 100%;
            padding: var(--space-2) var(--space-2);
            background: var(--bg-primary);
            border: 1px solid var(--border-default);
            border-radius: 6px;
            color: var(--fg-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            text-align: center;
            transition: all var(--duration-fast) var(--ease-out-quart);
        }
        .semester-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* ============================================
           TARGET RESULT
           ============================================ */
        .target-result {
            padding: var(--space-8) var(--space-6);
            text-align: center;
            border: 1px solid;
            border-radius: 12px;
            margin-top: var(--space-6);
            animation: scaleIn var(--duration-slow) var(--ease-out-expo);
        }
        .target-result.achievable {
            border-color: var(--success);
            background: var(--success-bg);
        }
        .target-result.unachievable {
            border-color: var(--danger);
            background: var(--danger-bg);
        }
        .target-result .result-label {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: var(--space-4);
            padding: var(--space-1) var(--space-3);
            border: 1px solid;
            display: inline-block;
            border-radius: 4px;
        }
        .target-result.achievable .result-label {
            border-color: var(--success); color: var(--success);
        }
        .target-result.unachievable .result-label {
            border-color: var(--danger); color: var(--danger);
        }
        .target-result .result-value {
            font-family: var(--font-serif);
            font-size: 48px; font-weight: 400;
            line-height: 1;
            margin-bottom: var(--space-2);
        }
        .target-result.achievable .result-value { color: var(--accent); }
        .target-result.unachievable .result-value { color: var(--danger); }
        .target-result .result-detail {
            font-size: 14px;
            color: var(--fg-secondary);
            max-width: 400px; margin: 0 auto;
            line-height: 1.6;
        }

        /* ============================================
           INPUTS
           ============================================ */
        .input-group { margin-bottom: var(--space-4); }
        .input-label {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 500;
            color: var(--fg-tertiary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: var(--space-2);
            display: block;
        }
        .input-field {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            color: var(--fg-primary);
            font-family: var(--font-mono);
            font-size: 14px;
            transition: all var(--duration-fast) var(--ease-out-quart);
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }
        .input-field::placeholder { color: var(--fg-muted); }

        /* ============================================
           FORM GRID
           ============================================ */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        /* ============================================
           ADD COURSE (inline, not modal)
           ============================================ */
        .add-course-area {
            margin-top: var(--space-5);
            padding-top: var(--space-5);
            border-top: 1px solid var(--border-default);

        /* ============================================
           ACCORDION
           ============================================ */
        .accordion-trigger {
            display: flex; justify-content: space-between; align-items: center;
            padding: var(--space-3) 0;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 600;
            color: var(--fg-tertiary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: var(--space-4);
            transition: color var(--duration-fast) var(--ease-out-quart);
        }
        .accordion-trigger:hover { color: var(--accent); }
        .accordion-body {
            display: none;
            padding-bottom: var(--space-2);
        }
        .accordion-body.open { display: block; animation: slideDown var(--duration-normal) var(--ease-out-quart); }
        .calc-detail-row {
            display: flex; justify-content: space-between;
            padding: var(--space-1) 0;
            font-family: var(--font-mono);
            font-size: 12px; color: var(--fg-secondary);
        }
        .calc-detail-row.total {
            border-top: 1px solid var(--border-default);
            margin-top: var(--space-2); padding-top: var(--space-2);
            color: var(--fg-primary); font-weight: 600;
        }

        /* ============================================
           EMPTY STATE
           ============================================ */
        .empty-state {
            text-align: center; padding: var(--space-10) var(--space-5);
            color: var(--fg-tertiary);
        }
        .empty-state p {
            font-family: var(--font-serif);
            font-size: 16px; font-style: italic;
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-default);
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .nav-inner {
            max-width: 640px; margin: 0 auto;
            display: flex; justify-content: space-around;
            padding: var(--space-2) var(--space-4) var(--space-3);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: var(--space-1); padding: var(--space-2) var(--space-4);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out-quart);
            border: none; background: none;
            color: var(--fg-muted);
            font-family: var(--font-mono);
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .nav-item:hover { color: var(--fg-secondary); }
        .nav-item.active { color: var(--accent); }
        .nav-item .nav-icon {
            font-size: 18px;
            opacity: 0.6;
            transition: opacity var(--duration-fast) var(--ease-out-quart);
        }
        .nav-item.active .nav-icon { opacity: 1; }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 640px) {
            .gpa-summary-inner { flex-direction: column; gap: var(--space-2); }
            .gpa-standing { margin-left: 0; }
            .course-inputs { grid-template-columns: 1fr 70px; }
            .semester-row { grid-template-columns: 1fr 70px 70px; gap: var(--space-2); }
            .form-grid { grid-template-columns: 1fr; }
            .target-result .result-value { font-size: 40px; }
            .gpa-number { font-size: 48px; }
            .gpa-number .decimal { font-size: 30px; }
        }

        /* ============================================
           UTILITIES
           ============================================ */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container header-inner">
                <div class="brand">
                    <span class="brand-mark">A</span>

                <!-- GPA TAB -->
                <div class="tab-content active" id="tab-gpa">

                    <div class="progress-track anim-fade-up anim-d2">

                    <div class="anim-fade-up anim-d3">

                        <div class="add-course-area" id="addCourseArea" style="display:none;">
                            <div class="catalog-search">
                                <input type="text" class="input-field" id="catalogSearch" placeholder="Search catalog..." oninput="filterCatalog()">
                            </div>
                            <div class="catalog-list" id="catalogList"></div>
                            <div class="input-group">
                                <label class="input-label">Or enter custom name</label>
                                <input type="text" class="input-field" id="customCourseName" placeholder="Course name">

                            <div class="input-group">
                                <label class="input-label">Credits</label>

                <!-- CGPA TAB -->
                <div class="tab-content" id="tab-cgpa">
                    <h2 class="section-title anim-fade-up">Semester History</h2>
                    <p class="section-subtitle anim-fade-up anim-d1">Toggle semesters and enter GPAs to track your cumulative performance.</p>

                    <div class="anim-fade-up anim-d2">
                        <div id="semestersList"></div>
                        <div class="action-row">
                            <button class="btn btn-danger" onclick="resetAll()">Reset All Records</button>
                        </div>
                    </div>
                </div>

                <!-- TARGET TAB -->
                <div class="tab-content" id="tab-target">
                    <h2 class="section-title anim-fade-up">Target Calculator</h2>
                    <p class="section-subtitle anim-fade-up anim-d1">Determine what GPA you need in remaining courses to hit your goal.</p>

                    <div class="anim-fade-up anim-d2" style="background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:12px;padding:var(--space-6);">
                        <div class="form-grid">
                            <div class="input-group">
                                <label class="input-label">Current CGPA</label>
                                <input type="text" class="input-field" id="targetCurrentCgpa" placeholder="3.25">
                            </div>
                            <div class="input-group">
                                <label class="input-label">Credits Completed</label>
                                <input type="text" class="input-field" id="targetDoneCredits" placeholder="78">
                            </div>
                            <div class="input-group">
                                <label class="input-label">Target CGPA</label>
                                <input type="text" class="input-field" id="targetCgpaInput" placeholder="3.75">
                            </div>
                            <div class="input-group">
                                <label class="input-label">Credits Remaining</label>
                                <input type="text" class="input-field" id="targetRemainingCredits" placeholder="42">
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width:100%;margin-top:var(--space-4);" onclick="calculateTarget()">Calculate Required GPA</button>
                    </div>

                    <div id="targetResult"></div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <div class="nav-inner">
                <button class="nav-item active" data-tab="gpa" onclick="switchTab('gpa')">
                    <span class="nav-icon">∑</span><span>GPA</span>
                </button>
                <button class="nav-item" data-tab="cgpa" onclick="switchTab('cgpa')">
                    <span class="nav-icon">∫</span><span>CGPA</span>
                </button>
                <button class="nav-item" data-tab="target" onclick="switchTab('target')">
                    <span class="nav-icon">→</span><span>Target</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        // ===== DATA =====
        const SEMESTERS = [
            { id: 'Y1S1', year: 1, num: 1, name: 'Year 1, Semester 1' },
            { id: 'Y1S2', year: 1, num: 2, name: 'Year 1, Semester 2' },
            { id: 'Y2S1', year: 2, num: 1, name: 'Year 2, Semester 1' },
            { id: 'Y2S2', year: 2, num: 2, name: 'Year 2, Semester 2' },
            { id: 'Y3S1', year: 3, num: 1, name: 'Year 3, Semester 1' },
            { id: 'Y3S2', year: 3, num: 2, name: 'Year 3, Semester 2' },
            { id: 'Y4S1', year: 4, num: 1, name: 'Year 4, Semester 1' },
            { id: 'Y4S2', year: 4, num: 2, name: 'Year 4, Semester 2' },
        ];

        const CATALOG = [
            { name: 'Advanced Database Systems', credits: 3 },
            { name: 'Applied Mathematics I', credits: 3 },
            { name: 'Automata and Complexity Theory', credits: 3 },
            { name: 'Communicative English I', credits: 3 },
            { name: 'Communicative English II', credits: 3 },
            { name: 'Compiler Design', credits: 3 },
            { name: 'Computer Graphics', credits: 3 },
            { name: 'Computer Organization and Architecture', credits: 3 },
            { name: 'Computer Programming', credits: 4 },
            { name: 'Computer Security', credits: 3 },
            { name: 'Computer Vision and Image Processing', credits: 3 },
            { name: 'Critical Thinking', credits: 3 },
            { name: 'Data Communication and Computer Networks', credits: 3 },
            { name: 'Data Structures and Algorithms', credits: 3 },
            { name: 'Design and Analysis of Algorithms', credits: 3 },
            { name: 'Digital Logic Design', credits: 3 },
            { name: 'Discrete Mathematics and Combinatorics', credits: 3 },
            { name: 'Distributed Systems', credits: 3 },
            { name: 'Economics', credits: 3 },
            { name: 'Elective', credits: 3 },
            { name: 'Emerging Technologies', credits: 3 },
            { name: 'Entrepreneurship and Business Development', credits: 3 },
            { name: 'Final Year Project I', credits: 3 },
            { name: 'Final Year Project II', credits: 3 },
            { name: 'Fundamentals of Database Systems', credits: 3 },
            { name: 'General Physics', credits: 3 },
            { name: 'General Psychology', credits: 3 },
            { name: 'Geography of Ethiopia and the Horn', credits: 3 },
            { name: 'Global Trends', credits: 2 },
            { name: 'History of Ethiopia and the Horn', credits: 3 },
            { name: 'Industrial Practice', credits: 2 },
            { name: 'Inclusiveness', credits: 2 },
            { name: 'Introduction to Artificial Intelligence', credits: 3 },
            { name: 'Java Programming', credits: 3 },
            { name: 'Linear Algebra', credits: 3 },
            { name: 'Mathematics for Natural Sciences', credits: 3 },
            { name: 'Microprocessor and Assembly Language', credits: 3 },
            { name: 'Moral and Civic Education', credits: 2 },
            { name: 'Network and System Administration', credits: 3 },
            { name: 'Numerical Analysis', credits: 3 },
            { name: 'Object Oriented Programming', credits: 3 },
            { name: 'Operating Systems', credits: 3 },
            { name: 'Physical Fitness', credits: 2 },
            { name: 'Probability and Statistics', credits: 3 },
            { name: 'Real-Time and Embedded Systems', credits: 3 },
            { name: 'Research Methods', credits: 2 },
            { name: 'Selected Topics in Computer Science', credits: 3 },
            { name: 'Social Anthropology', credits: 2 },
            { name: 'Software Engineering', credits: 3 },
            { name: 'Web Programming I', credits: 3 },
            { name: 'Web Programming II', credits: 3 },
            { name: 'Web Technologies', credits: 3 },
            { name: 'Wireless and Mobile Computing', credits: 3 },
        ];

        const DEFAULT_COURSES = {
            'Y1S1': [['Communicative English I',3],['Geography of Ethiopia and the Horn',3],['Critical Thinking',3],['Mathematics for Natural Sciences',3],['General Physics',3],['General Psychology',3],['Physical Fitness',2]],
            'Y1S2': [['Communicative English II',3],['Social Anthropology',2],['Economics',3],['Applied Mathematics I',3],['History of Ethiopia and the Horn',3],['Emerging Technologies',3],['Moral and Civic Education',2],['Global Trends',2]],
            'Y2S1': [['Computer Programming',4],['Fundamentals of Database Systems',3],['Digital Logic Design',3],['Linear Algebra',3],['Probability and Statistics',3],['Inclusiveness',2]],
            'Y2S2': [['Computer Organization and Architecture',3],['Data Communication and Computer Networks',3],['Advanced Database Systems',3],['Java Programming',3],['Discrete Mathematics and Combinatorics',3],['Numerical Analysis',3]],
            'Y3S1': [['Object Oriented Programming',3],['Data Structures and Algorithms',3],['Operating Systems',3],['Microprocessor and Assembly Language',3],['Software Engineering',3],['Web Programming I',3],['Automata and Complexity Theory',3]],
            'Y3S2': [['Real-Time and Embedded Systems',3],['Wireless and Mobile Computing',3],['Computer Graphics',3],['Web Programming II',3],['Design and Analysis of Algorithms',3],['Industrial Practice',2],['Entrepreneurship and Business Development',3]],
            'Y4S1': [['Introduction to Artificial Intelligence',3],['Computer Security',3],['Compiler Design',3],['Computer Vision and Image Processing',3],['Research Methods',2],['Final Year Project I',3],['Web Technologies',3]],
            'Y4S2': [['Network and System Administration',3],['Distributed Systems',3],['Final Year Project II',3],['Selected Topics in Computer Science',3],['Elective',3]],
        };

        let state = { semesters: {}, courses: {}, activeTab: 'gpa', selectedSemester: 'Y1S1', targetCredits: 3 };

        function init() {
            loadState();
            if (Object.keys(state.courses).length === 0) resetAllData();
            populateSemesterSelect();
            renderAll();
            setupEventListeners();
            loadTheme();
        }

        function resetAllData() {
            state.semesters = {}; state.courses = {};
            SEMESTERS.forEach(s => {
                state.semesters[s.id] = { ...s, included: true, manualGpa: null, manualCredits: null };
                state.courses[s.id] = DEFAULT_COURSES[s.id].map(([name, credits]) => ({
                    id: genId(), semesterId: s.id, name, creditHours: credits,
                    mark: null, letterGrade: null, gradePoint: null,
                    isIncluded: true, isMajor: false, isRetaken: false
                }));
            });
            saveState();
        }

        function resetSemesterData(semId) {
            state.courses[semId] = DEFAULT_COURSES[semId].map(([name, credits]) => ({
                id: genId(), semesterId: semId, name, creditHours: credits,
                mark: null, letterGrade: null, gradePoint: null,
                isIncluded: true, isMajor: false, isRetaken: false
            }));
            state.semesters[semId].included = true;
            state.semesters[semId].manualGpa = null;
            state.semesters[semId].manualCredits = null;
            saveState();
        }

        function saveState() { localStorage.setItem('actGpaCalc', JSON.stringify(state)); }
        function loadState() { const saved = localStorage.getItem('actGpaCalc'); if (saved) state = JSON.parse(saved); }
        function genId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

        function convertMarkToGrade(mark) {
            if (mark >= 90) return ['A+', 4.0];
            if (mark >= 85) return ['A', 4.0];
            if (mark >= 80) return ['A-', 3.75];
            if (mark >= 75) return ['B+', 3.5];
            if (mark >= 70) return ['B', 3.0];
            if (mark >= 65) return ['B-', 2.75];
            if (mark >= 60) return ['C+', 2.5];
            if (mark >= 55) return ['C', 2.0];
            if (mark >= 50) return ['C-', 1.75];
            if (mark >= 40) return ['D', 1.0];
            return ['F', 0.0];
        }

        function parseMarkInput(input) {
            const t = input.trim().toUpperCase();
            if (!t) return null;
            const num = parseFloat(t);
            if (!isNaN(num) && num >= 0 && num <= 100) return num;
            const map = { 'A+': 95, 'A': 87.5, 'A-': 82.5, 'B+': 77.5, 'B': 72.5, 'B-': 67.5, 'C+': 62.5, 'C': 57.5, 'C-': 52.5, 'D+': 47.5, 'D': 45, 'D-': 42.5, 'F': 0 };
            return map[t] ?? null;
        }

        function round2(n) { return Math.round(n * 100) / 100; }

        function calcSemesterGpa(semId) {
            const courses = state.courses[semId] || [];
            const valid = courses.filter(c => c.isIncluded && !c.isRetaken && c.mark != null);
            const major = valid.filter(c => c.isMajor);
            let totalGP = 0, totalCredits = 0;
            valid.forEach(c => { const [, gp] = convertMarkToGrade(c.mark); totalGP += c.creditHours * gp; totalCredits += c.creditHours; });
            let majorGP = 0, majorCredits = 0;
            major.forEach(c => { const [, gp] = convertMarkToGrade(c.mark); majorGP += c.creditHours * gp; majorCredits += c.creditHours; });
            return {
                gpa: totalCredits > 0 ? round2(totalGP / totalCredits) : 0,
                majorGpa: majorCredits > 0 ? round2(majorGP / majorCredits) : 0,
                earnedCredits: totalCredits,
                totalCredits: courses.filter(c => !c.isRetaken).reduce((s, c) => s + c.creditHours, 0),
                courses, validCourses: valid
            };
        }

        function calcCGPA() {
            let allMajorGP = 0, allMajorCr = 0;
            Object.values(state.courses).flat().forEach(c => {
                if (c.isIncluded && !c.isRetaken && c.mark != null && c.isMajor) {
                    const [, gp] = convertMarkToGrade(c.mark);
                    allMajorGP += c.creditHours * gp; allMajorCr += c.creditHours;
                }
            });
            const semData = {};
            SEMESTERS.forEach(s => {
                const calc = calcSemesterGpa(s.id);
                const sem = state.semesters[s.id];
                semData[s.id] = {
                    gpa: sem.manualGpa ?? calc.gpa,
                    credits: sem.manualCredits ?? (calc.earnedCredits || calc.totalCredits),
                    included: sem.included, isManual: sem.manualGpa != null
                };
            });
            let totalGP = 0, totalCredits = 0;
            Object.entries(semData).forEach(([id, d]) => {
                if (d.included && d.gpa > 0) { totalGP += d.credits * d.gpa; totalCredits += d.credits; }
            });
            const cgpa = totalCredits > 0 ? round2(totalGP / totalCredits) : 0;
            const standing = cgpa >= 3.8 ? "President's List" : cgpa >= 3.5 ? "Dean's List" : cgpa >= 2.0 ? "Good Standing" : cgpa > 0 ? "Academic Probation" : "Not Established";
            return { cgpa, majorCgpa: allMajorCr > 0 ? round2(allMajorGP / allMajorCr) : 0, totalCredits, standing, semData };
        }

        function renderAll() { renderGpaTab(); renderCgpaTab(); renderHeaderSummary(); }

        function renderHeaderSummary() {
            const result = calcCGPA();
            const semDetail = calcSemesterGpa(state.selectedSemester);

            // Update GPA number in header
            const gpaEl = document.getElementById('gpaValue');
            const gpaStr = state.activeTab === 'gpa' ? semDetail.gpa.toFixed(2) : result.cgpa.toFixed(2);
            const [whole, dec] = gpaStr.split('.');
            gpaEl.innerHTML = `${whole}<span class="decimal">.${dec}</span>`;

            // Major GPA
            const majorEl = document.getElementById('majorGpaDisplay');
            const majorGpa = state.activeTab === 'gpa' ? semDetail.majorGpa : result.majorCgpa;
            majorEl.textContent = majorGpa > 0 ? `Major: ${majorGpa.toFixed(2)}` : '';

            // Standing badge
            const standingContainer = document.getElementById('standingContainer');
            const standing = result.standing;
            const standingClass = result.cgpa >= 3.8 ? 'president' : result.cgpa >= 3.5 ? 'dean' : result.cgpa >= 2.0 ? 'good' : result.cgpa > 0 ? 'probation' : 'good';
            standingContainer.innerHTML = `<span class="standing-tag ${standingClass}">${standing}</span>`;
        }

        function renderGpaTab() {
            const detail = calcSemesterGpa(state.selectedSemester);
            document.getElementById('gpaProgress').style.width = Math.min(detail.gpa / 4 * 100, 100) + '%';

            const pill = document.getElementById('creditPill');
            pill.textContent = `${detail.totalCredits} / 21 CR`;
            pill.className = detail.totalCredits > 21 ? 'credit-pill warning' : 'credit-pill';

            const detailsEl = document.getElementById('calcDetailsContent');
            if (detail.validCourses.length === 0) {
                detailsEl.innerHTML = '<p style="color:var(--fg-tertiary);font-style:italic;">No courses with valid marks to show.</p>';
            } else {
                let html = ''; let totalGP = 0;
                detail.validCourses.forEach(c => {
                    const [, gp] = convertMarkToGrade(c.mark);
                    const contrib = c.creditHours * gp;
                    totalGP += contrib;
                    html += `<div class="calc-detail-row"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.name}</span><span>${c.letterGrade || 'F'} (${gp.toFixed(2)}) x ${c.creditHours}cr = ${contrib.toFixed(1)}</span></div>`;
                });
                html += `<div class="calc-detail-row total"><span>Total Grade Points</span><span style="color:var(--accent)">${totalGP.toFixed(2)}</span></div>`;
                detailsEl.innerHTML = html;
            }

            const listEl = document.getElementById('coursesList');
            if (detail.courses.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><p>No courses. Reset or add custom ones.</p></div>';
            } else {
                listEl.innerHTML = detail.courses.map(c => renderCourseCard(c)).join('');
            }
        }

        function renderCourseCard(c) {
            const [, gp] = c.mark != null ? convertMarkToGrade(c.mark) : ['', 0];
            const gradeClass = c.letterGrade ?
                (c.letterGrade.startsWith('A') ? 'grade-A' : c.letterGrade.startsWith('B') ? 'grade-B' : c.letterGrade.startsWith('C') ? 'grade-C' : c.letterGrade.startsWith('D') ? 'grade-D' : 'grade-F') : '';
            return `<div class="course-item ${!c.isIncluded ? 'excluded' : ''} ${c.isRetaken ? 'retaken' : ''}">
                <div class="course-top">
                    <div class="course-info">
                        <input type="checkbox" class="course-checkbox" ${c.isIncluded ? 'checked' : ''} onchange="toggleInclusion('${c.id}')">
                        <div>
                            <div class="course-name">${c.name}</div>
                            <div class="course-credits">${c.creditHours} credits</div>
                        </div>
                    </div>
                    <div class="course-actions">
                        ${c.letterGrade ? `<span class="grade-tag ${gradeClass}">${c.isRetaken ? 'RTK' : c.letterGrade}</span>` : ''}
                        <button class="course-delete" onclick="deleteCourse('${c.id}')">×</button>
                    </div>
                </div>
                <div class="course-inputs">
                    <input type="text" class="course-input" placeholder="Mark (0-100) or Grade" value="${c.mark != null ? (c.mark % 1 === 0 ? c.mark.toString() : c.mark) : ''}" onchange="updateMark('${c.id}', this.value)" onblur="updateMark('${c.id}', this.value)">
                    <select class="course-input" onchange="updateCredits('${c.id}', parseInt(this.value))">
                        ${[1,2,3,4].map(cr => `<option value="${cr}" ${c.creditHours === cr ? 'selected' : ''}>${cr} cr</option>`).join('')}
                    </select>
                </div>
                <div class="course-flags">
                    <label class="flag"><input type="checkbox" ${c.isMajor ? 'checked' : ''} onchange="toggleMajor('${c.id}')"><span>Major Course</span></label>
                    <label class="flag retake"><input type="checkbox" ${c.isRetaken ? 'checked' : ''} onchange="toggleRetaken('${c.id}')"><span>Retaken (Exclude)</span></label>
                </div>
            </div>`;
        }

        function renderCgpaTab() {
            const result = calcCGPA();
            document.getElementById('totalCreditsValue').textContent = result.totalCredits;

            const listEl = document.getElementById('semestersList');
            listEl.innerHTML = SEMESTERS.map(s => {
                const d = result.semData[s.id];
                return `<div class="semester-row ${!d.included ? 'excluded' : ''}">
                    <div class="semester-name">
                        <div class="toggle-track ${d.included ? 'on' : ''}" onclick="toggleSemester('${s.id}', ${!d.included})"></div>
                        <label onclick="toggleSemester('${s.id}', ${!d.included})">${s.name}</label>
                    </div>
                    <input type="text" class="semester-input" placeholder="GPA" value="${d.isManual ? d.gpa : (d.gpa > 0 ? d.gpa.toFixed(2) : '')}" onchange="updateSemManualGpa('${s.id}', this.value)">
                    <input type="text" class="semester-input" placeholder="Cr" value="${d.credits || ''}" onchange="updateSemManualCredits('${s.id}', this.value)">
                </div>`;
            }).join('');
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderAll();
        }

        function populateSemesterSelect() {
            const sel = document.getElementById('semesterSelect');
            sel.innerHTML = SEMESTERS.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            sel.value = state.selectedSemester;
            sel.onchange = (e) => { state.selectedSemester = e.target.value; renderAll(); };
        }

        function updateMark(courseId, value) {
            const sem = state.courses[state.selectedSemester];
            const c = sem.find(x => x.id === courseId);
            if (!c) return;
            const mark = parseMarkInput(value);
            if (mark == null) { c.mark = null; c.letterGrade = null; c.gradePoint = null; }
            else { const [letter, gp] = convertMarkToGrade(mark); c.mark = mark; c.letterGrade = letter; c.gradePoint = gp; }
            saveState(); renderAll();
        }

        function updateCredits(courseId, credits) {
            const sem = state.courses[state.selectedSemester];
            const c = sem.find(x => x.id === courseId);
            if (c) { c.creditHours = credits; saveState(); renderAll(); }
        }

        function toggleInclusion(courseId) {
            const sem = state.courses[state.selectedSemester];
            const c = sem.find(x => x.id === courseId);
            if (c) { c.isIncluded = !c.isIncluded; saveState(); renderAll(); }
        }

        function toggleMajor(courseId) {
            const sem = state.courses[state.selectedSemester];
            const c = sem.find(x => x.id === courseId);
            if (c) { c.isMajor = !c.isMajor; saveState(); renderAll(); }
        }

        function toggleRetaken(courseId) {
            const sem = state.courses[state.selectedSemester];
            const c = sem.find(x => x.id === courseId);
            if (c) { c.isRetaken = !c.isRetaken; saveState(); renderAll(); }
        }

        function deleteCourse(courseId) {
            state.courses[state.selectedSemester] = state.courses[state.selectedSemester].filter(c => c.id !== courseId);
            saveState(); renderAll();
        }

        function resetSemester() {
            if (!confirm('Reset all courses for this semester to defaults?')) return;
            resetSemesterData(state.selectedSemester);
            renderAll();
        }

        function toggleSemester(semId, included) {
            state.semesters[semId].included = included;
            saveState(); renderCgpaTab(); renderHeaderSummary();
        }

        function updateSemManualGpa(semId, value) {
            const n = parseFloat(value);
            state.semesters[semId].manualGpa = (isNaN(n) || n < 0 || n > 4) ? null : n;
            saveState(); renderCgpaTab(); renderHeaderSummary();
        }

        function updateSemManualCredits(semId, value) {
            const n = parseInt(value);
            state.semesters[semId].manualCredits = (isNaN(n) || n <= 0) ? null : n;
            saveState(); renderCgpaTab(); renderHeaderSummary();
        }

        function resetAll() {
            if (!confirm('Reset ALL data to defaults? This cannot be undone.')) return;
            resetAllData();
            renderAll();
        }

        function calculateTarget() {
            const currentCgpa = parseFloat(document.getElementById('targetCurrentCgpa').value) || 0;
            const doneCredits = parseInt(document.getElementById('targetDoneCredits').value) || 0;
            const targetCgpa = parseFloat(document.getElementById('targetCgpaInput').value) || 0;
            const remainingCredits = parseInt(document.getElementById('targetRemainingCredits').value) || 0;
            const resultEl = document.getElementById('targetResult');

            if (currentCgpa <= 0 || targetCgpa <= 0 || remainingCredits <= 0) {
                resultEl.innerHTML = '<div class="target-result unachievable" style="border-color:var(--warning);background:var(--warning-bg);"><div class="result-label" style="border-color:var(--warning);color:var(--warning)">Invalid Input</div><div class="result-detail">Please enter valid positive numbers for all fields.</div></div>';
                return;
            }
            if (currentCgpa > 4 || targetCgpa > 4) {
                resultEl.innerHTML = '<div class="target-result unachievable"><div class="result-label">Invalid Range</div><div class="result-detail">CGPA must be between 0 and 4.</div></div>';
                return;
            }

            const currentTotal = doneCredits * currentCgpa;
            const targetTotal = (doneCredits + remainingCredits) * targetCgpa;
            const required = round2((targetTotal - currentTotal) / remainingCredits);

            if (required > 4) {
                resultEl.innerHTML = `<div class="target-result unachievable"><div class="result-label">Goal Exceeds Limits</div><div class="result-value">${required.toFixed(2)}</div><div class="result-detail">Required GPA of <b>${required.toFixed(2)}</b> over ${remainingCredits} credits exceeds the 4.0 maximum.</div></div>`;
            } else {
                resultEl.innerHTML = `<div class="target-result achievable"><div class="result-label">Achievable Goal</div><div class="result-value">${required.toFixed(2)}</div><div class="result-detail">You need <b>${required.toFixed(2)}</b> GPA over ${remainingCredits} remaining credits to reach target CGPA of ${targetCgpa.toFixed(2)}.</div></div>`;
            }
        }

        // ===== ADD COURSE (inline, not modal) =====
        function openAddCourse() {
            document.getElementById('addCourseArea').style.display = 'block';
            document.getElementById('mainActions').style.display = 'none';
            document.getElementById('catalogSearch').value = '';
            document.getElementById('customCourseName').value = '';
            state.targetCredits = 3;
            selectCredit(3);
            filterCatalog();
            document.getElementById('catalogSearch').focus();
        }

        function closeAddCourse() {
            document.getElementById('addCourseArea').style.display = 'none';
            document.getElementById('mainActions').style.display = 'flex';
        }

        function filterCatalog() {
            const q = document.getElementById('catalogSearch').value.toLowerCase().trim();
            const filtered = q ? CATALOG.filter(c => c.name.toLowerCase().includes(q)) : CATALOG;
            document.getElementById('catalogList').innerHTML = filtered.map(c =>
                `<div class="catalog-item" onclick="selectCatalogCourse('${c.name}', ${c.credits})"><span>${c.name}</span><span class="cr">${c.credits} CR</span></div>`
            ).join('');
        }

        function selectCatalogCourse(name, credits) {
            document.getElementById('customCourseName').value = name;
            selectCredit(credits);
        }

        function selectCredit(cr) {
            state.targetCredits = cr;
            document.querySelectorAll('.credit-option').forEach(el => {
                el.classList.toggle('selected', parseInt(el.dataset.cr) === cr);
            });
        }

        function addCourse() {
            const name = (document.getElementById('customCourseName').value || '').trim();
            if (!name) return;
            const semCourses = state.courses[state.selectedSemester];
            const currentCredits = semCourses.reduce((s, c) => s + c.creditHours, 0);
            if (currentCredits + state.targetCredits > 21) { alert('Credit hour limit exceeded (max 21)'); return; }
            if (semCourses.some(c => c.name.toLowerCase() === name.toLowerCase())) { alert('Course already added!'); return; }
            semCourses.push({ id: genId(), semesterId: state.selectedSemester, name, creditHours: state.targetCredits, mark: null, letterGrade: null, gradePoint: null, isIncluded: true, isMajor: false, isRetaken: false });
            saveState(); closeAddCourse(); renderAll();
        }

        function toggleAccordion(trigger) {
            const body = trigger.nextElementSibling;
            const arrow = document.getElementById('accordionArrow');
            body.classList.toggle('open');
            arrow.textContent = body.classList.contains('open') ? '↑' : '↓';
        }

        // ===== THEME =====
        function loadTheme() {
            const saved = localStorage.getItem('actGpaTheme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'dark');
            setTheme(theme);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☾' : '☀';
            localStorage.setItem('actGpaTheme', theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        function setupEventListeners() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAddCourse(); });
        }

        init();
    </script>
</body>
</html>
